<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENVERI CAFFE | FINAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #d4a373; --bg: #000000; --card: #1a1a1a; --green: #2ecc71; --red: #e74c3c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:10000; display:flex; justify-content:center; align-items:center; }
        .pin-box { background:var(--card); padding:40px; border-radius:20px; border:2px solid var(--primary); text-align:center; }
        .pin-input { font-size:32px; padding:15px; width:180px; text-align:center; background:#000; color:var(--primary); border:2px solid #333; border-radius:10px; margin-bottom:20px; outline:none; }
        .sidebar { width: 90px; background: #080808; display: none; flex-direction: column; align-items: center; padding-top: 30px; gap: 30px; border-right: 1px solid #222; }
        .nav-item { color: #444; cursor: pointer; font-size: 28px; padding: 10px; }
        .nav-item.active { color: var(--primary); }
        .container { flex-grow: 1; padding: 25px; overflow-y: auto; display:none; }
        .page { display: none; }
        .page.active { display: block; }
        .pos-grid { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        .product-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #333; margin-bottom: 10px; font-weight: bold; font-size: 18px; }
        .cart-panel { background: #fff; color: #000; border-radius: 20px; padding: 20px; height: 80vh; display: flex; flex-direction: column; }
        .cart-list { flex-grow: 1; overflow-y: auto; }
        .cart-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 15px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-green { background: var(--green); color: white; width: 100%; }
        .order-card { background: #fff; color: #000; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 10px solid var(--primary); }
        
        /* ADMIN TABS */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .stat-box.active-tab { border-color: var(--primary); background: #222; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="pin-box">
        <h1 style="color:var(--primary)">ENVERI CAFFE</h1>
        <input type="password" id="pin-field" class="pin-input" maxlength="4">
        <br>
        <button class="btn btn-green" onclick="provoLogin()">KYÇU</button>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class="nav-item" id="n-arka" onclick="ndrroFaqen('arka', this)"><i class="fas fa-cash-register"></i></div>
    <div class="nav-item" id="n-shanku" onclick="ndrroFaqen('shanku', this)"><i class="fas fa-mug-hot"></i></div>
    <div class="nav-item" id="n-admin" onclick="ndrroFaqen('admin', this)"><i class="fas fa-chart-line"></i></div>
    <div class="nav-item" onclick="location.reload()" style="margin-top:auto; color:var(--red); padding-bottom:30px;"><i class="fas fa-power-off"></i></div>
</div>

<div class="container" id="main-cont">
    <div id="arka" class="page">
        <div class="pos-grid">
            <div>
                <h2 id="display-user" style="color:var(--primary)">-</h2>
                <div class="product-card" onclick="shto('Makiato V.', 1.0)">Makiato V. - 1.00€</div>
                <div class="product-card" onclick="shto('Makiato M.', 1.5)">Makiato M. - 1.50€</div>
                <div class="product-card" onclick="shto('Ekspreso', 1.0)">Ekspreso - 1.00€</div>
                <div class="product-card" onclick="shto('Çaj Rusi', 0.5)">Çaj Rusi - 0.50€</div>
                <div class="product-card" onclick="shto('Ujë', 1.0)">Ujë - 1.00€</div>
                <div class="product-card" onclick="shto('Lëngje', 2.0)">Lëngje - 2.00€</div>
            </div>
            <div class="cart-panel">
                <h3>Porosia</h3>
                <div id="lista-shportes" class="cart-list"></div>
                <h2 id="tot-shuma" style="text-align:center">0.00 €</h2>
                <button class="btn btn-green" onclick="dergoTeShanku()">DËRGO POROSINË</button>
            </div>
        </div>
    </div>

    <div id="shanku" class="page">
        <h1>🍺 Lista e Përgatitjes</h1>
        <div id="lista-shanku"></div>
    </div>

    <div id="admin" class="page">
        <div class="stats-grid">
            <div class="stat-box" id="tab-hyrje" onclick="setFiltriTabeles('hyrje')">Blerje<h2 id="h-tot" style="color:var(--red)">0.00€</h2></div>
            <div class="stat-box" id="tab-dalje" onclick="setFiltriTabeles('dalje')">Xhiro<h2 id="d-tot" style="color:var(--green)">0.00€</h2></div>
            <div class="stat-box active-tab" id="tab-gjitha" onclick="setFiltriTabeles('gjitha')">Fitimi<h2 id="f-tot" style="color:var(--primary)">0.00€</h2></div>
        </div>
        <div style="background:var(--card); padding:20px; border-radius:15px; margin-bottom:20px; display:flex; gap:10px;">
            <input type="text" id="bl-emri" placeholder="Artikulli..." style="padding:10px; border-radius:5px;">
            <input type="number" id="bl-shuma" placeholder="€" style="padding:10px; width:70px;">
            <select id="m-select" onchange="filtro()" style="padding:10px;">
                <option value="1">Janar</option><option value="2">Shkurt</option><option value="3">Mars</option>
                <option value="4">Prill</option><option value="5">Maj</option><option value="6">Qershor</option>
                <option value="7">Korrik</option><option value="8">Gusht</option><option value="9">Shtator</option>
                <option value="10">Tetor</option><option value="11">Nëntor</option><option value="12">Dhjetor</option>
            </select>
            <button class="btn" style="background:var(--primary); color:black" onclick="shtoBlerje()">RUAJ</button>
        </div>
        <table>
            <thead><tr><th>Data</th><th>Përshkrimi</th><th>Vlera</th><th>X</th></tr></thead>
            <tbody id="t-body"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBh_7BwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
        authDomain: "herolind-6ca5f.firebaseapp.com",
        databaseURL: "https://herolind-6ca5f-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "herolind-6ca5f",
        storageBucket: "herolind-6ca5f.firebasestorage.app",
        messagingSenderId: "893085364638",
        appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let transaksionet = [];
    let shporta = {};
    let rolyAktual = "";
    let emriUser = "";
    let filtriTabeles = "gjitha"; // hyrje, dalje, gjitha

    function provoLogin() {
        const pin = document.getElementById('pin-field').value;
        const screen = document.getElementById('login-screen');
        const cont = document.getElementById('main-cont');
        const side = document.getElementById('sidebar');

        if(pin === "0000") { rolyAktual = "admin"; emriUser = "Enveri"; side.style.display = 'flex'; ndrroFaqen('admin', document.getElementById('n-admin')); }
        else if(pin === "3333") { rolyAktual = "shank"; emriUser = "Shankisti"; ndrroFaqen('shanku'); }
        else if(pin === "1111" || pin === "2222") { rolyAktual = "kamarier"; emriUser = pin==="1111"?"Kamarieri 1":"Kamarieri 2"; ndrroFaqen('arka'); }
        else { alert("PIN i gabuar!"); return; }

        screen.style.display = 'none'; cont.style.display = 'block';
        document.getElementById('display-user').innerText = emriUser;
    }

    function ndrroFaqen(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        filtro();
    }

    function shto(e, c) {
        if(shporta[e]) shporta[e].q += 1; else shporta[e] = { p: c, q: 1 };
        renderShporta();
    }

    function hiq(e) {
        if(shporta[e].q > 1) shporta[e].q -= 1; else delete shporta[e];
        renderShporta();
    }

    function renderShporta() {
        const div = document.getElementById('lista-shportes');
        let t = 0; div.innerHTML = "";
        for (let e in shporta) {
            let i = shporta[e]; t += (i.p * i.q);
            div.innerHTML += `<div class="cart-item"><span>${i.q}x ${e}</span><span>${(i.p*i.q).toFixed(2)}€ <i class="fas fa-times-circle" style="color:red;cursor:pointer" onclick="hiq('${e}')"></i></span></div>`;
        }
        document.getElementById('tot-shuma').innerText = t.toFixed(2) + " €";
    }

    function dergoTeShanku() {
        let t = 0; let d = [];
        for(let e in shporta) { t += (shporta[e].p * shporta[e].q); d.push(e + " x" + shporta[e].q); }
        if(t === 0) return;
        const id = Date.now();
        db.ref('transactions/' + id).set({
            id: id, date: new Date().toISOString(), month: new Date().getMonth() + 1,
            type: 'dalje', desc: d.join(", "), amount: t, status: 'e-re', nga: emriUser
        });
        shporta = {}; renderShporta(); alert("U dërgua!");
    }

    db.ref('transactions').on('value', snap => {
        transaksionet = snap.val() ? Object.values(snap.val()) : [];
        filtro();
    });

    function setFiltriTabeles(f) {
        filtriTabeles = f;
        document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active-tab'));
        document.getElementById('tab-' + f).classList.add('active-tab');
        filtro();
    }

    function filtro() {
        const m = parseInt(document.getElementById('m-select').value);
        const tb = document.getElementById('t-body');
        const sd = document.getElementById('lista-shanku');

        if(sd) {
            sd.innerHTML = transaksionet.filter(t => t.status === 'e-re').map(t => `
                <div class="order-card">
                    <small>Nga: ${t.nga} | ${new Date(t.date).toLocaleTimeString()}</small>
                    <h2>${t.desc}</h2>
                    <button class="btn btn-green" onclick="db.ref('transactions/${t.id}').update({status:'kryer'})">GATI ✅</button>
                </div>`).join('');
        }

        if(tb && rolyAktual === 'admin') {
            tb.innerHTML = ""; let h = 0; let d = 0;
            const dataFiltruar = transaksionet.filter(t => t.month === m);
            
            dataFiltruar.sort((a,b) => b.id - a.id).forEach(t => {
                const v = parseFloat(t.amount);
                if(t.type === 'hyrje') h += v; else d += v;

                if(filtriTabeles === 'gjitha' || filtriTabeles === t.type) {
                    tb.innerHTML += `<tr>
                        <td>${new Date(t.date).toLocaleDateString()}</td>
                        <td>${t.desc}</td>
                        <td style="color:${t.type=='hyrje'?'red':'green'}">${v.toFixed(2)}€</td>
                        <td><button onclick="db.ref('transactions/${t.id}').remove()" style="color:red;background:none;border:none;cursor:pointer"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
                }
            });
            document.getElementById('h-tot').innerText = h.toFixed(2) + " €";
            document.getElementById('d-tot').innerText = d.toFixed(2) + " €";
            document.getElementById('f-tot').innerText = (d - h).toFixed(2) + " €";
        }
    }

    function shtoBlerje() {
        const e = document.getElementById('bl-emri').value;
        const s = parseFloat(document.getElementById('bl-shuma').value);
        if(!e || !s) return;
        const id = Date.now();
        db.ref('transactions/' + id).set({
            id: id, date: new Date().toISOString(), month: parseInt(document.getElementById('m-select').value),
            type: 'hyrje', desc: "Blerje: " + e, amount: s, status: 'kryer', nga: 'Admin'
        });
        document.getElementById('bl-emri').value = ""; document.getElementById('bl-shuma').value = "";
    }

    window.onload = () => { document.getElementById('m-select').value = new Date().getMonth() + 1; };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC FERONIKELI 74 | Cloud Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* TEMA E RE: GJELBËR DHE BARDHË */
            --primary-green: #008751; /* Gjelbër kryesore */
            --dark-green: #00663d;    /* Gjelbër më e errët për hover */
            --bg-white: #ffffff;      /* Sfondi kryesor */
            --bg-light: #f4f7f6;     /* Sfondi i dytë (karta, inpute) */
            --text-dark: #1a1a1a;     /* Teksti kryesor */
            --text-light: #ffffff;    /* Tekst mbi sfond gjelbër */
            --border: #e0e6e4;        /* Kornizat */
            --success: #2ecc71;       /* Ngjyra për PAGUAR */
            --danger: #e74c3c;        /* Ngjyra për BORXHLI */
            --glass: rgba(0, 135, 81, 0.05); /* Efekt xhami i lehtë gjelbër */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-white); color: var(--text-dark); padding-bottom: 50px; }
        
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-green); z-index: 9999; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: var(--bg-white); padding: 40px; border-radius: 30px; border: none;
            width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-card input {
            width:100%; padding:15px; border-radius:12px; background: var(--bg-light); border: 1px solid var(--border); 
            color: var(--text-dark); margin-bottom:15px; outline:none; transition: 0.3s;
        }
        .login-card input:focus { border-color: var(--primary-green); background: #fff; }

        header { 
            padding: 20px; background: var(--bg-white); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--bg-light); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center;
            border-top: 4px solid var(--primary-green); transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card h3 { font-size: 1.6rem; color: var(--text-dark); }
        .stat-card p { font-size: 0.6rem; color: #7f8c8d; text-transform: uppercase; font-weight: 800; margin-top: 5px; }
        
        .filter-tags { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .tag-btn { 
            background: var(--bg-light); border: 1px solid var(--border); color: var(--text-dark); 
            padding: 10px 18px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.8rem; transition: 0.3s;
        }
        .tag-btn:hover { background: #e8eeee; }
        .tag-btn.active { background: var(--primary-green); color: var(--text-light); border-color: var(--primary-green); }
        
        .search-box { position: relative; margin-bottom: 20px; }
        #searchInput { 
            width: 100%; padding: 18px; border-radius: 15px; background: var(--bg-light); border: 1px solid var(--border); 
            color: var(--text-dark); text-align: center; outline: none; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary-green); background: #fff; box-shadow: 0 5px 15px rgba(0,135,81,0.05); }
        
        .search-results { 
            background: #fff; border-radius: 15px; border: 1px solid var(--border); margin-top: 5px; 
            max-height: 300px; overflow-y: auto; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .result-item { 
            padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; 
            display: flex; justify-content: space-between; color: var(--text-dark); transition: 0.2s;
        }
        .result-item:hover { background: var(--glass); }
        .result-item b { color: var(--primary-green); }

        .player-profile { 
            background: var(--bg-light); border-radius: 25px; border: 1px solid var(--border); 
            padding: 30px; margin-top: 20px; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        
        .months-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .month-btn { 
            background: #fff; border: 1px solid var(--border); color: var(--text-dark); 
            padding: 15px 5px; border-radius: 12px; cursor: pointer; text-align: center; font-size: 0.8rem; transition: 0.3s;
        }
        .month-btn:hover:not(.paid) { border-color: var(--primary-green); background: var(--glass); }
        .month-btn.paid { background: var(--success); color: var(--text-light); font-weight: 800; border-color: var(--success); }
        
        .history-list { 
            background: #fff; padding: 15px; border-radius: 15px; font-size: 0.85rem; 
            max-height: 150px; overflow-y: auto; border: 1px solid var(--border); 
        }
        .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; color: var(--text-dark); }
        .history-item span { font-weight: 600; }
        .history-item b { color: var(--primary-green); }
        .history-item small { color: #7f8c8d; }

        .btn-main { 
            background: var(--primary-green); color: var(--text-light); border: none; 
            padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .btn-main:hover { background: var(--dark-green); transform: translateY(-1px); }
        
        .btn-danger { 
            background: rgba(231, 76, 60, 0.05); color: var(--danger); border: 1px solid var(--danger); 
            padding: 12px; border-radius: 12px; cursor: pointer; width: 100%; margin-top: 25px; font-weight: 800; transition: 0.3s;
        }
        .btn-danger:hover { background: var(--danger); color: white; }
        
        .modal { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); 
        }
        .modal-content { 
            background: #fff; padding: 35px; border-radius: 30px; width: 90%; 
            max-width: 400px; border: none; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .modal-content h2 { color: var(--text-dark); margin-bottom: 20px; }
        .modal-content input, .modal-content select {
            width:100%; padding:15px; margin-bottom:15px; background: var(--bg-light); 
            border:1px solid var(--border); color: var(--text-dark); border-radius:10px; outline: none;
        }
        
        #dashboardMonth {
            background: var(--bg-light); border: 1px solid var(--border); color: var(--primary-green); 
            padding: 8px 15px; border-radius: 10px; font-weight: 800; outline: none; cursor: pointer;
        }

        /* Scrollbar i personalizuar gjelber */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-light); }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-green); }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1 style="color: var(--primary-green); margin-bottom: 10px; font-weight: 800;">FC FERONIKELI 74</h1>
            <p style="color: #7f8c8d; margin-bottom: 30px; font-size: 0.9rem;">Sistemi Cloud 2026</p>
            <input type="text" id="user" placeholder="Përdoruesi">
            <input type="password" id="pass" placeholder="Fjalëkalimi">
            <button class="btn-main" style="width:100%" onclick="handleLogin()">KYÇU</button>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <header>
            <div style="font-weight: 800; color: var(--primary-green); font-size: 1.5rem;">FC FERONIKELI 74 ⚽</div>
            <div style="display:flex; gap:10px; align-items: center;">
                <button class="btn-main" onclick="openModal('regModal')">+ SHTO LOJTAR</button>
                <button onclick="logout()" style="background:none; border:none; color: #7f8c8d; font-size:0.8rem; cursor:pointer; font-weight: 600;">Dalja</button>
            </div>
        </header>

        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h4 style="color: #7f8c8d; font-size: 0.8rem; text-transform: uppercase; font-weight: 800;">Pasqyra Financiare</h4>
                <select id="dashboardMonth" onchange="updateDashboard()"></select>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><h3 id="stat-total">0</h3><p>Lojtarë</p></div>
                <div class="stat-card"><h3 id="stat-paid" style="color: var(--success);">0</h3><p>Paguar</p></div>
                <div class="stat-card"><h3 id="stat-debt" style="color: var(--danger);">0</h3><p>Borxhli</p></div>
                <div class="stat-card"><h3 id="stat-money" style="color: var(--primary-green);">0€</h3><p>Arka</p></div>
            </div>

            <div style="display: flex; gap:10px; margin-bottom: 25px;">
                <button class="tag-btn" onclick="exportData()" style="font-weight: 600; color: var(--primary-green);">📊 Shkarko Raportin (CSV)</button>
            </div>

            <div class="filter-tags">
                <button class="tag-btn active" id="btn-all" onclick="filterByCat('All')">TË GJITHË</button>
                <button class="tag-btn" onclick="filterByCat('U9')">U9</button>
                <button class="tag-btn" onclick="filterByCat('U11')">U11</button>
                <button class="tag-btn" onclick="filterByCat('U13')">U13</button>
                <button class="tag-btn" onclick="filterByCat('U15')">U15</button>
                <button class="tag-btn" onclick="filterByCat('U17')">U17</button>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Kërko lojtarin me emër..." onkeyup="searchPlayer()">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div id="playerProfile" class="player-profile">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
                    <div>
                        <h2 id="viewName" style="font-size: 2.2rem; text-transform: capitalize; color: var(--text-dark); font-weight: 800;">---</h2>
                        <p id="viewCat" style="color: var(--primary-green); font-weight: 700; background: var(--glass); display: inline-block; padding: 3px 10px; border-radius: 20px; margin-top: 5px; font-size: 0.8rem;"></p>
                        <p id="regDate" style="font-size: 0.75rem; color: #7f8c8d; margin-top: 8px;"></p>
                    </div>
                    <div id="viewStatus" style="padding: 12px 25px; border-radius: 12px; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">---</div>
                </div>
                
                <h3 style="font-size: 1rem; margin-bottom: 15px; color: var(--text-dark);">Statusi i Pagesave 2026</h3>
                <div class="months-grid" id="monthsGrid"></div>
                
                <p style="font-size: 0.75rem; color: #7f8c8d; margin-bottom: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Historiku i fundit:</p>
                <div class="history-list" id="paymentHistory"></div>
                
                <button class="btn-danger" onclick="deletePlayer()">FSHIJ LOJTARIN NGA SISTEMI</button>
                <p onclick="closeProfile()" style="text-align:center; margin-top:25px; cursor:pointer; color: #7f8c8d; font-weight: 600; font-size: 0.9rem;">Mbyll Profilin</p>
            </div>
        </div>
    </div>

    <div id="regModal" class="modal">
        <div class="modal-content">
            <h2>Regjistro Lojtar të Ri</h2>
            <input type="text" id="regName" placeholder="Emri dhe Mbiemri plotë">
            <select id="regCategory">
                <option value="" disabled selected>Zgjidh Kategorinë</option>
                <option value="U9">U9</option><option value="U11">U11</option><option value="U13">U13</option><option value="U15">U15</option><option value="U17">U17</option>
            </select>
            <button class="btn-main" style="width:100%" onclick="saveNewPlayer()">RUAJ NË CLOUD</button>
            <p onclick="closeModal('regModal')" style="text-align:center; margin-top:18px; cursor:pointer; color: #7f8c8d; font-weight: 600;">Anulo</p>
        </div>
    </div>

    <div id="payModal" class="modal">
        <div class="modal-content">
            <h2 id="payModalTitle" style="color: var(--primary-green);">Konfirmo Pagesën</h2>
            <p style="margin-bottom: 15px; color: #7f8c8d; font-size: 0.9rem;">Shuma standarde mujore:</p>
            <input type="number" id="payAmount" value="20">
            <button class="btn-main" style="width:100%" onclick="executePayment()">KONFIRMO</button>
            <p onclick="closeModal('payModal')" style="text-align:center; margin-top:18px; cursor:pointer; color: #7f8c8d; font-weight: 600;">Mbyll</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Konfigurimi mbetet i njejte
        const firebaseConfig = {
            apiKey: "AIzaSyBh_7bwfNbKbscPSW1ZN9Y_UvAntsjl9Wg",
            authDomain: "herolind-6ca5f.firebaseapp.com",
            databaseURL: "https://herolind-6ca5f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "herolind-6ca5f",
            storageBucket: "herolind-6ca5f.firebasestorage.app",
            messagingSenderId: "893085364638",
            appId: "1:893085364638:web:2db59e6ec72ad7e7c1a68f"
        };

        const app = initializeApp(firebaseConfig);
        const dbCloud = getFirestore(app);
        const playersRef = collection(dbCloud, "players_fcferonikeli74");

        let players = [];
        let currentId = null;
        let selectedMonthForPayment = null;
        const months = ["Janar", "Shkurt", "Mars", "Prill", "Maj", "Qershor", "Korrik", "Gusht", "Shtator", "Tetor", "Nëntor", "Dhjetor"];

        window.handleLogin = () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "FERONIKELI74" && p === "admin74") {
                sessionStorage.setItem('gb_auth', 'true');
                location.reload();
            } else { alert("Përdoruesi ose fjalëkalimi gabim!"); }
        };

        window.logout = () => { sessionStorage.removeItem('gb_auth'); location.reload(); };

        if(sessionStorage.getItem('gb_auth') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            const sel = document.getElementById('dashboardMonth');
            const curIdx = new Date().getMonth();
            months.forEach((m, i) => {
                let opt = new Option(m, m);
                if(i === curIdx) opt.selected = true;
                sel.add(opt);
            });

            onSnapshot(playersRef, (snapshot) => {
                players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateDashboard();
                if(currentId) openProfile(currentId);
            });
        }

        window.saveNewPlayer = async () => {
            const name = document.getElementById('regName').value;
            const cat = document.getElementById('regCategory').value;
            if(!name || !cat) { alert("Ju lutem plotësoni emrin dhe zgjidhni kategorinë!"); return; }
            await addDoc(playersRef, { 
                name, 
                category: cat, 
                payments: [],
                registeredAt: new Date().toLocaleDateString('sq-AL')
            });
            closeModal('regModal');
            document.getElementById('regName').value = "";
            document.getElementById('regCategory').selectedIndex = 0;
        };

        window.openProfile = (id) => {
            currentId = id;
            const p = players.find(x => x.id === id);
            if(!p) return;
            document.getElementById('playerProfile').style.display = 'block';
            document.getElementById('viewName').innerText = p.name;
            document.getElementById('viewCat').innerText = p.category;
            document.getElementById('regDate').innerText = "Regjistruar më: " + p.registeredAt;
            
            document.getElementById('monthsGrid').innerHTML = months.map(m => {
                const pay = p.payments.find(px => px.month === m);
                // Ikona ✅ eshte zevendesuar me tekst me te paster ne CSS
                return `<div class="month-btn ${pay ? 'paid' : ''}" onclick="initPay('${m}', ${!!pay})">${m}<br>${pay ? pay.amount+'€' : '❌'}</div>`;
            }).join('');

            const hist = document.getElementById('paymentHistory');
            hist.innerHTML = p.payments.length ? p.payments.map(pay => `
                <div class="history-item"><span>${pay.month}</span><small>${pay.date}</small><b>+${pay.amount}€</b></div>`).reverse().join('') : "<p style='color:#7f8c8d; text-align:center; padding:10px;'>Nuk ka pagesa të regjistruara.</p>";

            const currentMonthName = months[new Date().getMonth()];
            const isPaid = p.payments.some(pay => pay.month === currentMonthName);
            const st = document.getElementById('viewStatus');
            st.innerText = isPaid ? "PAGUAR" : "BORXHLI";
            
            // Ngjyrat dinamike per statusin
            st.style.background = isPaid ? "rgba(46, 204, 113, 0.1)" : "rgba(231, 76, 60, 0.1)";
            st.style.color = isPaid ? "var(--success)" : "var(--danger)";
            st.style.border = isPaid ? "1px solid var(--success)" : "1px solid var(--danger)";

            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchInput').value = "";
        };

        window.initPay = (m, isPaid) => { 
            if(!isPaid) { 
                selectedMonthForPayment = m; 
                document.getElementById('payModalTitle').innerText = "Pagesa për " + m;
                openModal('payModal'); 
            } 
        };

        window.executePayment = async () => {
            const amount = document.getElementById('payAmount').value;
            if(!amount || amount <= 0) { alert("Shuma nuk është valide!"); return; }
            
            const p = players.find(x => x.id === currentId);
            const newPayments = [...p.payments, { 
                month: selectedMonthForPayment, 
                amount: parseFloat(amount).toFixed(2), 
                date: new Date().toLocaleString('sq-AL', { hour12: false }) 
            }];
            await updateDoc(doc(dbCloud, "players_fcferonikeli74", currentId), { payments: newPayments });
            closeModal('payModal');
            document.getElementById('payAmount').value = "20"; // Reset standard
        };

        window.updateDashboard = () => {
            const m = document.getElementById('dashboardMonth').value;
            if(!m) return;
            let paid = 0, money = 0;
            players.forEach(p => {
                const py = p.payments.find(x => x.month === m);
                if(py) { paid++; money += parseFloat(py.amount); }
            });
            document.getElementById('stat-total').innerText = players.length;
            document.getElementById('stat-paid').innerText = paid;
            document.getElementById('stat-debt').innerText = players.length - paid;
            document.getElementById('stat-money').innerText = money.toFixed(2) + "€";
        };

        window.searchPlayer = () => {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const res = document.getElementById('searchResults');
            if(val.length < 1) { res.style.display = 'none'; return; }
            const filtered = players.filter(p => p.name.toLowerCase().includes(val));
            res.innerHTML = filtered.map(p => `<div class="result-item" onclick="openProfile('${p.id}')"><span>${p.name}</span><b>${p.category}</b></div>`).join('');
            res.style.display = 'block';
        };

        window.filterByCat = (cat) => {
            // Hiq listen e vjeter te filtrimit nese eshte e hapur
            closeProfile();
            // Largo klasen active nga te gjithe butonat
            document.querySelectorAll('.filter-tags .tag-btn').forEach(b => b.classList.remove('active'));
            // Shto klasen active te butoni i klikuar (duhet gjetur ne baze te tekstit ose ID)
            event.target.classList.add('active');

            const res = document.getElementById('searchResults');
            const filtered = cat === 'All' ? players : players.filter(p => p.category === cat);
            
            if(filtered.length === 0) {
                res.innerHTML = "<p style='color:#7f8c8d; text-align:center; padding:15px;'>Nuk ka lojtarë në këtë kategori.</p>";
            } else {
                // Rreshto sipas emrit
                filtered.sort((a, b) => a.name.localeCompare(b.name));
                res.innerHTML = filtered.map(p => `<div class="result-item" onclick="openProfile('${p.id}')"><span>${p.name}</span><b>${p.category}</b></div>`).join('');
            }
            res.style.display = 'block';
        };

        window.exportData = () => {
            if(players.length === 0) { alert("Nuk ka të dhëna për të eksportuar."); return; }
            let csv = "Emri,Kategoria,Data Regjistrimit,Pagesa Totale\n";
            players.forEach(p => {
                let total = 0; p.payments.forEach(pay => total += parseFloat(pay.amount));
                csv += `"${p.name}","${p.category}","${p.registeredAt}","${total.toFixed(2)}€"\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Raporti_Cloud_FC_FERONIKELI_74.csv'; a.click();
        };

        window.deletePlayer = async () => { 
            if(confirm("KUJDES! A jeni të sigurt që dëshironi ta fshini lojtarin '" + players.find(x => x.id === currentId).name + "' përfundimisht nga sistemi? Ky veprim nuk mund të kthehet.")) { 
                await deleteDoc(doc(dbCloud, "players_fcferonikeli74", currentId)); 
                closeProfile(); 
            } 
        };
        
        window.openModal = (id) => {
            document.getElementById(id).style.display = 'flex';
            // Fokus te inputi i pare nese ka
            const firstInput = document.getElementById(id).querySelector('input');
            if(firstInput) firstInput.focus();
        };
        
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        
        window.closeProfile = () => { 
            currentId = null; 
            document.getElementById('playerProfile').style.display = 'none'; 
            document.getElementById('searchResults').style.display = 'none'; // Fshih edhe listen e filtrimit nese eshte hapur
        };
        
        // Mbylle modalin nese klikohet jashte tij
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = "none";
            }
        }
    </script>
</body>
</html>
